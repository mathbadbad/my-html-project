<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眠音 - AI助眠助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --tide-sand: #F7F5F0;
            --tide-mist: #E8F4F8;
            --tide-forest: #E8F5E9;
            --tide-dusk: #F3E5F5;
            --tide-blue: #B3D9E8;
            --tide-green: #A8D5BA;
            --tide-purple: #D1C4E9;
            --tide-text: #4A5568;
            --tide-text-light: #718096;
            --tide-white: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--tide-sand);
            min-height: 100vh;
            color: var(--tide-text);
            line-height: 1.6;
        }

        .breathing-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { background: radial-gradient(circle at 50% 50%, var(--tide-mist) 0%, transparent 70%); }
            50% { background: radial-gradient(circle at 50% 50%, var(--tide-blue) 0%, transparent 60%); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .app-name {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 8px;
            color: var(--tide-text);
            margin-bottom: 8px;
        }

        .date-display {
            font-size: 0.9em;
            color: var(--tide-text-light);
            letter-spacing: 2px;
        }

        .scene-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .scene-card {
            background: var(--tide-white);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .scene-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
        .scene-card.selected { border-color: var(--tide-blue); background: var(--tide-mist); }
        .scene-card.night.selected { border-color: var(--tide-purple); background: var(--tide-dusk); }
        .scene-icon { font-size: 2.5em; margin-bottom: 12px; }
        .scene-title { font-size: 1.1em; font-weight: 500; margin-bottom: 6px; }
        .scene-desc { font-size: 0.8em; color: var(--tide-text-light); line-height: 1.4; }

        .voice-section {
            background: linear-gradient(135deg, rgba(179,217,232,0.3) 0%, rgba(168,213,186,0.3) 100%);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 2px solid rgba(179,217,232,0.5);
        }

        .voice-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .voice-icon {
            width: 44px;
            height: 44px;
            background: var(--tide-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .voice-title { font-size: 1.1em; font-weight: 500; }
        .voice-subtitle { font-size: 0.8em; color: var(--tide-text-light); }

        .meditation-themes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .theme-card {
            background: var(--tide-white);
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .theme-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
        .theme-card.selected { border-color: var(--tide-green); background: var(--tide-forest); }
        .theme-icon { font-size: 1.8em; margin-bottom: 6px; }
        .theme-name { font-size: 0.85em; font-weight: 500; margin-bottom: 2px; }
        .theme-duration { font-size: 0.7em; color: var(--tide-text-light); }

        .voice-settings {
            background: rgba(255,255,255,0.8);
            border-radius: 12px;
            padding: 15px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .setting-row:last-child { margin-bottom: 0; }
        .setting-label { font-size: 0.85em; color: var(--tide-text); }

        .voice-btn {
            padding: 6px 12px;
            border: 1px solid #E2E8F0;
            background: var(--tide-white);
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .voice-btn:hover { border-color: var(--tide-blue); background: var(--tide-mist); }
        .voice-btn.selected { background: var(--tide-blue); border-color: var(--tide-blue); color: white; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #E2E8F0;
            border-radius: 2px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--tide-blue);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value { font-size: 0.8em; color: var(--tide-text-light); min-width: 35px; text-align: right; }

        .dimensions-section, .wake-section {
            background: var(--tide-white);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 400;
            margin-bottom: 20px;
            text-align: center;
            color: var(--tide-text);
            letter-spacing: 1px;
        }

        .dimension { margin-bottom: 20px; }
        .dimension:last-child { margin-bottom: 0; }
        .dimension-label { font-size: 0.8em; color: var(--tide-text-light); margin-bottom: 10px; display: block; }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .option-btn {
            padding: 8px 14px;
            border: 1px solid #E2E8F0;
            background: var(--tide-white);
            color: var(--tide-text);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8em;
            flex: 1;
            min-width: 70px;
            text-align: center;
        }

        .option-btn:hover { border-color: var(--tide-blue); background: var(--tide-mist); }
        .option-btn.selected { background: var(--tide-blue); border-color: var(--tide-blue); color: white; }

        .wake-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: #E2E8F0;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active { background: var(--tide-green); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(22px); }

        .wake-settings { display: none; }
        .wake-settings.active { display: block; }

        .time-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .time-display {
            font-size: 2em;
            font-weight: 300;
            color: var(--tide-text);
            letter-spacing: 2px;
        }

        .time-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #E2E8F0;
            background: var(--tide-white);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wake-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .wake-option {
            padding: 10px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .wake-option:hover { border-color: var(--tide-green); background: var(--tide-forest); }
        .wake-option.selected { background: var(--tide-green); border-color: var(--tide-green); color: white; }

        .generate-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.1em;
            background: linear-gradient(135deg, var(--tide-blue) 0%, var(--tide-green) 100%);
            border: none;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            transition: all 0.4s;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(179, 217, 232, 0.4);
        }

        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(179, 217, 232, 0.5); }

        .player-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, var(--tide-mist) 0%, var(--tide-sand) 100%);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .player-section.active { display: flex; }
        .player-close {
            position: absolute;
            top: 30px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            font-size: 1.3em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breathing-guide {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            display: none;
        }

        .breathing-guide.active { display: block; }

        .breathing-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, var(--tide-blue) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.6;
            animation: breatheCircle 8s ease-in-out infinite;
        }

        @keyframes breatheCircle {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(2); opacity: 0.8; }
        }

        .breathing-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1em;
            color: var(--tide-text);
        }

        .voice-text-display {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 20px;
            max-width: 380px;
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1em;
            line-height: 1.7;
            color: var(--tide-text);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            display: none;
            min-height: 80px;
        }

        .voice-text-display.active { display: block; }

        .progress-ring {
            position: relative;
            width: 240px;
            height: 240px;
            margin-bottom: 25px;
        }

        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.5); stroke-width: 4; }
        .progress-ring-fill { fill: none; stroke: url(#gradient); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-display {
            font-size: 2.8em;
            font-weight: 300;
            color: var(--tide-text);
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .timer-label { font-size: 0.85em; color: var(--tide-text-light); }

        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 25px;
            opacity: 0.6;
        }

        .viz-bar {
            width: 4px;
            background: linear-gradient(to top, var(--tide-blue), var(--tide-green));
            border-radius: 2px;
            animation: wave 1.2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .control-btn.primary {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--tide-blue), var(--tide-green));
            color: white;
            font-size: 1.8em;
        }

        .skip-voice-btn {
            padding: 10px 18px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #E2E8F0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            color: var(--tide-text);
            margin-top: 15px;
            display: none;
        }

        .skip-voice-btn.active { display: block; }

        .sleep-profile-card {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 20px;
            max-width: 380px;
            width: 100%;
            margin-bottom: 20px;
        }

        .profile-title { font-size: 0.85em; color: var(--tide-text-light); margin-bottom: 12px; text-align: center; }
        .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .profile-tag { padding: 5px 12px; background: var(--tide-mist); border-radius: 16px; font-size: 0.75em; }

        @media (max-width: 480px) {
            .scene-cards, .meditation-themes { grid-template-columns: 1fr; }
            .timer-display { font-size: 2.2em; }
            .progress-ring { width: 200px; height: 200px; }
            .breathing-guide { width: 150px; height: 150px; }
        }
    </style>
</head>
<body>
    <div class="breathing-bg"></div>

    <svg width="0" height="0">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#B3D9E8"/>
                <stop offset="100%" style="stop-color:#A8D5BA"/>
            </linearGradient>
        </defs>
    </svg>

    <div class="container">
        <header>
            <h1 class="app-name">眠音</h1>
            <p class="date-display" id="dateDisplay"></p>
        </header>

        <div class="scene-cards">
            <div class="scene-card" data-scene="nap" onclick="selectScene('nap')">
                <div class="scene-icon">☀️</div>
                <div class="scene-title">午睡</div>
                <div class="scene-desc">20-30分钟<br>快速恢复精力</div>
            </div>
            <div class="scene-card night" data-scene="night" onclick="selectScene('night')">
                <div class="scene-icon">🌙</div>
                <div class="scene-title">睡眠</div>
                <div class="scene-desc">整夜深度休息<br>智能唤醒</div>
            </div>
        </div>

        <div class="voice-section">
            <div class="voice-header">
                <div class="voice-icon">🗣️</div>
                <div>
                    <div class="voice-title">人声引导冥想</div>
                    <div class="voice-subtitle">温柔的语音引导你进入深度放松</div>
                </div>
            </div>

            <div class="meditation-themes">
                <div class="theme-card" onclick="selectTheme(this, 'bodyscan')">
                    <div class="theme-icon">🧘</div>
                    <div class="theme-name">身体扫描</div>
                    <div class="theme-duration">10分钟 · 深度放松</div>
                </div>
                <div class="theme-card" onclick="selectTheme(this, 'breath')">
                    <div class="theme-icon">🌬️</div>
                    <div class="theme-name">呼吸放松</div>
                    <div class="theme-duration">5分钟 · 平复心绪</div>
                </div>
                <div class="theme-card" onclick="selectTheme(this, 'gratitude')">
                    <div class="theme-icon">🙏</div>
                    <div class="theme-name">感恩练习</div>
                    <div class="theme-duration">8分钟 · 心灵安抚</div>
                </div>
                <div class="theme-card" onclick="selectTheme(this, 'story')">
                    <div class="theme-icon">📖</div>
                    <div class="theme-name">睡前故事</div>
                    <div class="theme-duration">15分钟 · 温柔入眠</div>
                </div>
            </div>

            <div class="voice-settings">
                <div class="setting-row">
                    <span class="setting-label">语音类型</span>
                    <div>
                        <button class="voice-btn selected" onclick="selectVoice(this, 'female')">温柔女声</button>
                        <button class="voice-btn" onclick="selectVoice(this, 'male')">沉稳男声</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">语速</span>
                    <div class="slider-container">
                        <input type="range" class="slider" id="rateSlider" min="0.5" max="1.0" step="0.1" value="0.8">
                        <span class="slider-value" id="rateValue">0.8</span>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">音量</span>
                    <div class="slider-container">
                        <input type="range" class="slider" id="voiceVolumeSlider" min="0" max="100" value="80">
                        <span class="slider-value" id="voiceVolumeValue">80%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="dimensions-section">
            <h2 class="section-title">今日状态</h2>

            <div class="dimension">
                <span class="dimension-label">心情</span>
                <div class="options">
                    <button class="option-btn" onclick="selectOption(this, 'mood', 'happy')">😊 愉悦</button>
                    <button class="option-btn" onclick="selectOption(this, 'mood', 'calm')">😌 平静</button>
                    <button class="option-btn" onclick="selectOption(this, 'mood', 'anxious')">😰 焦虑</button>
                    <button class="option-btn" onclick="selectOption(this, 'mood', 'tired')">😔 疲惫</button>
                </div>
            </div>

            <div class="dimension">
                <span class="dimension-label">身体</span>
                <div class="options">
                    <button class="option-btn" onclick="selectOption(this, 'body', 'light')">🍃 轻盈</button>
                    <button class="option-btn" onclick="selectOption(this, 'body', 'normal')">⚖️ 正常</button>
                    <button class="option-btn" onclick="selectOption(this, 'body', 'heavy')">🪨 沉重</button>
                    <button class="option-btn" onclick="selectOption(this, 'body', 'sore')">🤕 酸痛</button>
                </div>
            </div>

            <div class="dimension">
                <span class="dimension-label">思绪</span>
                <div class="options">
                    <button class="option-btn" onclick="selectOption(this, 'mind', 'clear')">🌊 清晰</button>
                    <button class="option-btn" onclick="selectOption(this, 'mind', 'scattered')">🍂 纷杂</button>
                    <button class="option-btn" onclick="selectOption(this, 'mind', 'worried')">⛈️ 忧虑</button>
                    <button class="option-btn" onclick="selectOption(this, 'mind', 'excited')">🔥 兴奋</button>
                </div>
            </div>

            <div class="dimension">
                <span class="dimension-label">今日经历</span>
                <div class="options">
                    <button class="option-btn" onclick="selectOption(this, 'experience', 'good')">🌟 美好</button>
                    <button class="option-btn" onclick="selectOption(this, 'experience', 'ordinary')">📖 平常</button>
                    <button class="option-btn" onclick="selectOption(this, 'experience', 'tough')">🏔️ 艰难</button>
                    <button class="option-btn" onclick="selectOption(this, 'experience', 'tense')">⚡ 紧张</button>
                </div>
            </div>

            <div class="dimension">
                <span class="dimension-label">睡眠需求</span>
                <div class="options">
                    <button class="option-btn" onclick="selectOption(this, 'need', 'quick')">⚡ 快速入睡</button>
                    <button class="option-btn" onclick="selectOption(this, 'need', 'deep')">🌙 深度恢复</button>
                    <button class="option-btn" onclick="selectOption(this, 'need', 'refresh')">🌅 晨起清爽</button>
                    <button class="option-btn" onclick="selectOption(this, 'need', 'peace')">🕊️ 内心平静</button>
                </div>
            </div>
        </div>

        <div class="wake-section">
            <div class="wake-toggle">
                <span class="dimension-label" style="margin:0;">智能唤醒</span>
                <div class="toggle-switch" id="wakeToggle" onclick="toggleWake()"></div>
            </div>

            <div class="wake-settings" id="wakeSettings">
                <div class="time-picker">
                    <button class="time-btn" onclick="adjustTime(-5)">−</button>
                    <div class="time-display" id="wakeTime">07:00</div>
                    <button class="time-btn" onclick="adjustTime(5)">+</button>
                </div>

                <div class="wake-options">
                    <div class="wake-option selected" onclick="selectWakeMode(this, 'gentle')">🌅 温柔曙光</div>
                    <div class="wake-option" onclick="selectWakeMode(this, 'nature')">🌊 自然苏醒</div>
                    <div class="wake-option" onclick="selectWakeMode(this, 'energy')">☀️ 活力唤醒</div>
                    <div class="wake-option" onclick="selectWakeMode(this, 'smart')">🧠 智能分析</div>
                </div>
            </div>
        </div>

        <button class="generate-btn" onclick="generateSleepAudio()">开始睡眠旅程</button>
    </div>

    <div class="player-section" id="playerSection">
        <button class="player-close" onclick="closePlayer()">✕</button>

        <div class="sleep-profile-card">
            <div class="profile-title">你的睡眠配方</div>
            <div class="profile-tags" id="profileTags"></div>
        </div>

        <div class="breathing-guide" id="breathingGuide">
            <div class="breathing-circle"></div>
            <div class="breathing-text" id="breathingText">吸气</div>
        </div>

        <div class="voice-text-display" id="voiceTextDisplay">准备开始冥想...</div>

        <div class="visualizer" id="visualizer"></div>

        <div class="progress-ring">
            <svg width="240" height="240">
                <circle class="progress-ring-bg" cx="120" cy="120" r="110"/>
                <circle class="progress-ring-fill" id="progressCircle" cx="120" cy="120" r="110" stroke-dasharray="691.15" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-content">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="timer-label" id="timerLabel">剩余时间</div>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn" onclick="stopAudio()">⏹</button>
            <button class="control-btn primary" id="playBtn" onclick="togglePlay()">▶</button>
        </div>

        <button class="skip-voice-btn" id="skipVoiceBtn" onclick="skipVoice()">跳过语音，仅播放音效</button>
    </div>

    <script>
        const state = {
            scene: null, mood: null, body: null, mind: null, experience: null, need: null,
            voiceTheme: null, voiceType: 'female', voiceRate: 0.8, voiceVolume: 0.8,
            wakeEnabled: false, wakeTime: 420, wakeMode: 'gentle',
            isPlaying: false, isVoicePlaying: false, audioContext: null,
            oscillators: [], gainNodes: [], noiseNode: null,
            timerInterval: null, currentTime: 0, totalTime: 0,
            voiceTimeout: null, currentScriptIndex: 0, wakeTimeout: null
        };

        const scripts = {
            bodyscan: [
                { text: "欢迎来到身体扫描冥想。请找一个舒适的姿势躺下，轻轻闭上眼睛。", duration: 5000, breathe: false },
                { text: "现在，将注意力带到头顶。感受头皮的放松，让任何紧张都随风而去。", duration: 6000, breathe: false },
                { text: "慢慢向下，来到你的额头。舒展眉心，让面部肌肉完全柔软。", duration: 6000, breathe: false },
                { text: "感受你的呼吸...吸气...呼气...", duration: 4000, breathe: true, breatheType: 'inhale' },
                { text: "来到颈部和肩膀。这是压力的聚集地。让肩膀下沉，远离耳朵。", duration: 7000, breathe: false },
                { text: "感受你的双臂，从肩膀到手指尖。让它们变得沉重，陷入床垫的支撑中。", duration: 7000, breathe: false },
                { text: "现在来到胸部。感受呼吸的起伏，像海浪一样自然流动。", duration: 6000, breathe: true, breatheType: 'normal' },
                { text: "腹部...让这里的肌肉完全放松。不需要控制，只需要感受。", duration: 6000, breathe: false },
                { text: "背部...从脊椎到腰部。感受床垫的支撑，你被安全地托着。", duration: 7000, breathe: false },
                { text: "臀部...大腿...小腿...直到脚趾尖。整个身体完全放松。", duration: 8000, breathe: false },
                { text: "你做得很好。让这种放松的感觉停留。你可以在这里休息，或者自然入睡。晚安。", duration: 8000, breathe: false }
            ],
            breath: [
                { text: "欢迎来到呼吸放松练习。请躺下，一只手放在腹部。", duration: 4000, breathe: false },
                { text: "我们开始4-7-8呼吸法。用鼻子吸气，数4下...", duration: 4000, breathe: true, breatheType: 'inhale4' },
                { text: "屏住呼吸，数7下...", duration: 7000, breathe: true, breatheType: 'hold' },
                { text: "用嘴呼气，数8下...发出轻微的叹息声...", duration: 8000, breathe: true, breatheType: 'exhale8' },
                { text: "再次...吸气...2...3...4...", duration: 4000, breathe: true, breatheType: 'inhale4' },
                { text: "屏息...2...3...4...5...6...7...", duration: 7000, breathe: true, breatheType: 'hold' },
                { text: "呼气...2...3...4...5...6...7...8...", duration: 8000, breathe: true, breatheType: 'exhale8' },
                { text: "继续这个节奏。每一次呼吸，都让你更加放松。祝你有个美好的睡眠。", duration: 7000, breathe: true, breatheType: 'normal' }
            ],
            gratitude: [
                { text: "欢迎来到睡前感恩练习。在这个安静的时刻，让我们回顾今天的美好。", duration: 5000, breathe: false },
                { text: "首先，感谢你自己。感谢你度过了这一天，感谢你的努力和坚持。", duration: 6000, breathe: false },
                { text: "想想今天让你微笑的一件事。也许是一个温暖的瞬间，一句友善的话。", duration: 7000, breathe: false },
                { text: "感受那份温暖现在就在你心里。", duration: 4000, breathe: true, breatheType: 'normal' },
                { text: "感谢你的身体。它今天为你做了很多，现在它需要休息。", duration: 6000, breathe: false },
                { text: "感谢你的呼吸，它一直陪伴着你，从不间断。", duration: 5000, breathe: true, breatheType: 'normal' },
                { text: "想想你爱的人。感谢他们在你的生命中。", duration: 6000, breathe: false },
                { text: "感谢这个安全的空间，让你可以安心入睡。", duration: 5000, breathe: false },
                { text: "带着这份感恩，让心完全放松。你值得这份宁静。晚安。", duration: 7000, breathe: false }
            ],
            story: [
                { text: "今晚，我想带你去一个地方。一个只属于你的宁静之地。", duration: 5000, breathe: false },
                { text: "想象你躺在一片柔软的草地上。头顶是深邃的夜空，缀满星星。", duration: 6000, breathe: false },
                { text: "空气清凉而清新，带着淡淡的花香。", duration: 5000, breathe: true, breatheType: 'normal' },
                { text: "远处传来小溪的流水声，像一首永恒的摇篮曲。", duration: 6000, breathe: false },
                { text: "你感到草地温柔地托着你，像大地母亲的怀抱。", duration: 6000, breathe: false },
                { text: "一颗流星划过天际。你许下一个愿望，然后看着它消失在夜空中。", duration: 7000, breathe: false },
                { text: "风轻轻吹过，树叶沙沙作响。这是自然的催眠曲。", duration: 6000, breathe: false },
                { text: "你的眼皮变得沉重。星星开始模糊，变成温暖的光晕。", duration: 6000, breathe: false },
                { text: "在这片宁静的草地上，你可以放心地睡了。晚安，愿你的梦境如星空般美丽。", duration: 8000, breathe: false }
            ]
        };

        function initDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-CN', options);
        }

        function selectScene(scene) {
            state.scene = scene;
            document.querySelectorAll('.scene-card').forEach(card => card.classList.remove('selected'));
            document.querySelector(`[data-scene="${scene}"]`).classList.add('selected');
            if (scene === 'nap') {
                document.querySelector('.wake-section').style.opacity = '0.5';
                document.querySelector('.wake-section').style.pointerEvents = 'none';
            } else {
                document.querySelector('.wake-section').style.opacity = '1';
                document.querySelector('.wake-section').style.pointerEvents = 'auto';
            }
        }

        function selectTheme(el, theme) {
            state.voiceTheme = theme;
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function selectVoice(btn, type) {
            state.voiceType = type;
            btn.parentElement.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        document.getElementById('rateSlider').addEventListener('input', (e) => {
            state.voiceRate = parseFloat(e.target.value);
            document.getElementById('rateValue').textContent = state.voiceRate.toFixed(1);
        });

        document.getElementById('voiceVolumeSlider').addEventListener('input', (e) => {
            state.voiceVolume = parseInt(e.target.value) / 100;
            document.getElementById('voiceVolumeValue').textContent = e.target.value + '%';
        });

        function selectOption(btn, dim, val) {
            state[dim] = val;
            const container = btn.parentElement;
            container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function toggleWake() {
            state.wakeEnabled = !state.wakeEnabled;
            document.getElementById('wakeToggle').classList.toggle('active');
            document.getElementById('wakeSettings').classList.toggle('active');
        }

        function adjustTime(min) {
            state.wakeTime += min;
            if (state.wakeTime < 0) state.wakeTime = 1439;
            if (state.wakeTime >= 1440) state.wakeTime = 0;
            updateWakeDisplay();
        }

        function updateWakeDisplay() {
            const h = Math.floor(state.wakeTime / 60);
            const m = state.wakeTime % 60;
            const str = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            document.getElementById('wakeTime').textContent = str;
        }

        function selectWakeMode(el, mode) {
            state.wakeMode = mode;
            document.querySelectorAll('.wake-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function generateSleepAudio() {
            if (!state.scene) { alert('请选择睡眠场景'); return; }
            if (!state.mood || !state.body || !state.mind || !state.experience || !state.need) {
                alert('请完成所有状态选项'); return;
            }

            const profile = generateProfile();
            state.totalTime = profile.duration;

            const tags = document.getElementById('profileTags');
            let html = profile.tags.map(t => `<span class="profile-tag">${t}</span>`).join('');
            if (state.voiceTheme) {
                const names = { bodyscan: '🧘 身体扫描', breath: '🌬️ 呼吸放松', gratitude: '🙏 感恩练习', story: '📖 睡前故事' };
                html += `<span class="profile-tag">${names[state.voiceTheme]}</span>`;
                html += `<span class="profile-tag">${state.voiceType === 'female' ? '👩 女声' : '👨 男声'}</span>`;
            }
            tags.innerHTML = html;

            initAudio(profile);
            initVisualizer();
            document.getElementById('playerSection').classList.add('active');

            if (state.voiceTheme) {
                document.getElementById('voiceTextDisplay').classList.add('active');
                document.getElementById('skipVoiceBtn').classList.add('active');
            }

            togglePlay();
            if (state.wakeEnabled && state.scene === 'night') scheduleWakeUp();
        }

        function generateProfile() {
            const profile = { frequencies: [], noiseType: 'pink', noiseLevel: 0.3, tags: [], duration: state.scene === 'nap' ? 25 * 60 : 8 * 60 * 60 };

            const maps = {
                mood: { happy: { f: [528], t: '528Hz' }, calm: { f: [432], t: '432Hz' }, anxious: { f: [396, 4], t: '释压' }, tired: { f: [174, 2], t: '深放' } },
                body: { light: { t: '🍃' }, normal: { t: '⚖️' }, heavy: { f: [285], t: '释重' }, sore: { f: [174, 285], t: '修复' } },
                mind: { clear: { t: '🌊' }, scattered: { f: [6, 8], t: '专注' }, worried: { f: [417], t: '解忧' }, excited: { f: [10, 396], t: '接地' } },
                experience: { good: { t: '🌟' }, ordinary: { t: '📖' }, tough: { n: 'brown', l: 0.5, t: '棕噪' }, tense: { f: [741], t: '清理' } },
                need: { quick: { f: [4], t: '速睡' }, deep: { f: [2, 1], t: '深睡' }, refresh: { f: [2.5, 10], t: '恢复' }, peace: { f: [6, 432], t: '平静' } }
            };

            ['mood', 'body', 'mind', 'experience', 'need'].forEach(dim => {
                const conf = maps[dim][state[dim]];
                if (conf) {
                    if (conf.f) profile.frequencies.push(...conf.f);
                    if (conf.n) { profile.noiseType = conf.n; profile.noiseLevel = conf.l; }
                    profile.tags.push(conf.t);
                }
            });

            profile.tags.push(state.scene === 'nap' ? '☀️ 午睡' : '🌙 夜间');
            return profile;
        }

        function initAudio(profile) {
            if (state.audioContext) state.audioContext.close();
            state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const masterGain = state.audioContext.createGain();
            masterGain.gain.setValueAtTime(0.5, state.audioContext.currentTime);
            masterGain.connect(state.audioContext.destination);
            state.gainNodes = [masterGain];

            profile.frequencies.forEach((freq, i) => {
                if (freq < 20) {
                    createBinauralBeat(freq, 200 + i * 10, 0.1, masterGain);
                } else {
                    const osc = state.audioContext.createOscillator();
                    const gain = state.audioContext.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, state.audioContext.currentTime);
                    gain.gain.setValueAtTime(0.15, state.audioContext.currentTime);
                    osc.connect(gain);
                    gain.connect(masterGain);
                    state.oscillators.push(osc);
                    state.gainNodes.push(gain);
                }
            });

            createNoise(profile.noiseType, profile.noiseLevel, masterGain);
        }

        function createBinauralBeat(bf, cf, vol, dest) {
            const o1 = state.audioContext.createOscillator();
            const o2 = state.audioContext.createOscillator();
            const g1 = state.audioContext.createGain();
            const g2 = state.audioContext.createGain();
            o1.type = o2.type = 'sine';
            o1.frequency.setValueAtTime(cf, state.audioContext.currentTime);
            o2.frequency.setValueAtTime(cf + bf, state.audioContext.currentTime);
            g1.gain.setValueAtTime(vol, state.audioContext.currentTime);
            g2.gain.setValueAtTime(vol, state.audioContext.currentTime);
            o1.connect(g1); g1.connect(dest);
            o2.connect(g2); g2.connect(dest);
            state.oscillators.push(o1, o2);
            state.gainNodes.push(g1, g2);
        }

        function createNoise(type, level, dest) {
            const bs = 2 * state.audioContext.sampleRate;
            const buf = state.audioContext.createBuffer(1, bs, state.audioContext.sampleRate);
            const out = buf.getChannelData(0);
            let last = 0;
            for (let i = 0; i < bs; i++) {
                const w = Math.random() * 2 - 1;
                if (type === 'brown') {
                    out[i] = (last + (0.02 * w)) / 1.02;
                    last = out[i];
                    out[i] *= 3.5;
                } else out[i] = w;
            }
            const noise = state.audioContext.createBufferSource();
            noise.buffer = buf;
            noise.loop = true;
            const filter = state.audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(type === 'brown' ? 800 : 1200, state.audioContext.currentTime);
            const gain = state.audioContext.createGain();
            gain.gain.setValueAtTime(level, state.audioContext.currentTime);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(dest);
            state.noiseNode = noise;
            state.gainNodes.push(gain);
        }

        function playVoiceScript() {
            if (!state.voiceTheme || !window.speechSynthesis) return;
            const script = scripts[state.voiceTheme];
            if (!script) return;

            state.isVoicePlaying = true;
            state.currentScriptIndex = 0;

            function playNext() {
                if (state.currentScriptIndex >= script.length || !state.isPlaying) {
                    state.isVoicePlaying = false;
                    return;
                }
                const line = script[state.currentScriptIndex];
                document.getElementById('voiceTextDisplay').textContent = line.text;

                if (line.breathe) {
                    document.getElementById('breathingGuide').classList.add('active');
                    const bt = { inhale: '吸气', exhale: '呼气', inhale4: '吸气...', exhale8: '呼气...', hold: '屏息', normal: '呼吸' };
                    document.getElementById('breathingText').textContent = bt[line.breatheType] || '呼吸';
                } else {
                    document.getElementById('breathingGuide').classList.remove('active');
                }

                const u = new SpeechSynthesisUtterance(line.text);
                u.lang = 'zh-CN';
                u.rate = state.voiceRate;
                u.volume = state.voiceVolume;
                const voices = window.speechSynthesis.getVoices();
                if (state.voiceType === 'female') {
                    const fv = voices.find(v => v.name.includes('Female') || v.name.includes('Ting') || v.name.includes('Mei'));
                    if (fv) u.voice = fv;
                } else {
                    const mv = voices.find(v => v.name.includes('Male') || v.name.includes('Hui'));
                    if (mv) u.voice = mv;
                }
                u.onend = () => {
                    state.currentScriptIndex++;
                    if (state.isPlaying) state.voiceTimeout = setTimeout(playNext, 500);
                };
                window.speechSynthesis.speak(u);
            }
            playNext();
        }

        function skipVoice() {
            window.speechSynthesis.cancel();
            clearTimeout(state.voiceTimeout);
            state.isVoicePlaying = false;
            document.getElementById('voiceTextDisplay').classList.remove('active');
            document.getElementById('breathingGuide').classList.remove('active');
            document.getElementById('skipVoiceBtn').classList.remove('active');
        }

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (state.isPlaying) {
                state.oscillators.forEach(o => o.stop());
                if (state.noiseNode) state.noiseNode.stop();
                window.speechSynthesis.cancel();
                clearTimeout(state.voiceTimeout);
                clearInterval(state.timerInterval);
                state.isPlaying = false;
                state.isVoicePlaying = false;
                btn.innerHTML = '▶';
            } else {
                state.oscillators.forEach(o => o.start());
                if (state.noiseNode) state.noiseNode.start();
                state.isPlaying = true;
                btn.innerHTML = '⏸';
                startTimer();
                if (state.voiceTheme && state.currentScriptIndex === 0) setTimeout(playVoiceScript, 1000);
            }
        }

        function stopAudio() {
            if (state.audioContext) state.audioContext.close();
            window.speechSynthesis.cancel();
            clearTimeout(state.voiceTimeout);
            clearInterval(state.timerInterval);
            clearTimeout(state.wakeTimeout);
            state.isPlaying = false;
            state.isVoicePlaying = false;
            state.currentTime = 0;
            state.currentScriptIndex = 0;
            closePlayer();
        }

        function closePlayer() {
            document.getElementById('playerSection').classList.remove('active');
            document.getElementById('voiceTextDisplay').classList.remove('active');
            document.getElementById('breathingGuide').classList.remove('active');
            document.getElementById('skipVoiceBtn').classList.remove('active');
        }

        function startTimer() {
            updateTimer();
            state.timerInterval = setInterval(() => {
                state.currentTime++;
                updateTimer();
                updateProgress();
                if (state.currentTime >= state.totalTime) stopAudio();
            }, 1000);
        }

        function updateTimer() {
            const r = state.totalTime - state.currentTime;
            const h = Math.floor(r / 3600);
            const m = Math.floor((r % 3600) / 60);
            const s = r % 60;
            const d = h > 0 ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            document.getElementById('timerDisplay').textContent = d;
        }

        function updateProgress() {
            const p = state.currentTime / state.totalTime;
            const c = 2 * Math.PI * 110;
            document.getElementById('progressCircle').style.strokeDashoffset = c - (p * c);
        }

        function scheduleWakeUp() {
            const now = new Date();
            const cm = now.getHours() * 60 + now.getMinutes();
            let dm = state.wakeTime - cm;
            if (dm < 0) dm += 24 * 60;
            state.wakeTimeout = setTimeout(playWakeUpSound, dm * 60 * 1000);
        }

        function playWakeUpSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const freqs = { gentle: [528, 639], nature: [432, 440], energy: [523, 659, 784], smart: [528, 417] }[state.wakeMode] || [528, 639];
            const mg = ctx.createGain();
            mg.gain.setValueAtTime(0, ctx.currentTime);
            mg.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 30);
            mg.connect(ctx.destination);
            freqs.forEach(f => {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(f, ctx.currentTime);
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                o.connect(g);
                g.connect(mg);
                o.start();
                o.stop(ctx.currentTime + 60);
            });
            document.getElementById('timerLabel').textContent = '唤醒中...';
            document.getElementById('timerDisplay').textContent = '🌅';
            if (navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 2000]);
        }

        function initVisualizer() {
            const c = document.getElementById('visualizer');
            c.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const b = document.createElement('div');
                b.className = 'viz-bar';
                b.style.height = '20px';
                b.style.animationDelay = `${i * 0.1}s`;
                c.appendChild(b);
            }
        }

        window.speechSynthesis.getVoices();
        initDate();
        updateWakeDisplay();
    </script>
</body>
</html>
